name: daily-screener

on:
  schedule:
    # 台股 13:30 收盤，但 FinMind 日K 約 17:30 才更新（TWSE 盤後 ~14:30）。
    # 設 UTC 10:00 = 台灣 18:00，確保兩個資料源當日資料都齊全。
    - cron: "0 10 * * 1-5"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run pipeline
        env:
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          NVIDIA_BASE_URL: ${{ secrets.NVIDIA_BASE_URL }}
          NVIDIA_MODEL: ${{ secrets.NVIDIA_MODEL }}
          FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
        run: python run_pipeline.py

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f data/results/*.json
          if git diff --cached --quiet; then
            echo "No changes."
          else
            git commit -m "chore: daily screener result $(date -u +%F)"
            git push
          fi
